<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e13" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>OnvioMenos — Meus Documentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ====================== LOGIN ====================== -->
  <main id="loginView" class="login" hidden>
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">O−</div>
        <div>
          <h1>OnvioMenos</h1>
          <p class="muted">Seus holerites e informes, sem um super app.</p>
        </div>
      </div>

      <form id="loginForm" autocomplete="on">
        <label class="field">
          <span>CPF</span>
          <input id="cpf" inputmode="numeric" autocomplete="username"
                 placeholder="000.000.000-00" maxlength="14" required />
        </label>

        <label class="field">
          <span>Senha</span>
          <span class="pw-wrap">
            <input id="senha" type="password" autocomplete="current-password"
                   placeholder="sua senha" required />
            <button type="button" id="togglePw" class="pw-toggle" aria-label="Mostrar senha">👁</button>
          </span>
        </label>

        <p id="loginError" class="error" hidden></p>

        <button type="submit" id="loginSubmit" class="primary block">Entrar</button>
        <p class="muted hint">Use o mesmo CPF e senha do app <strong>Domínio Para Você</strong>.</p>
      </form>
    </div>
  </main>

  <!-- ====================== LISTA ====================== -->
  <div id="listView" hidden>
    <header class="topbar">
      <div class="brand sm">
        <div class="brand-mark">O−</div>
        <h1>OnvioMenos</h1>
      </div>
      <button id="logoutBtn" class="ghost">Sair</button>
    </header>

    <section class="toolbar">
      <div class="filters">
        <label class="select">
          <span>Ano</span>
          <select id="yearSelect"></select>
        </label>
        <label class="select">
          <span>Tipo</span>
          <select id="typeSelect"><option value="">Todos</option></select>
        </label>
        <label class="select">
          <span>Ordenar</span>
          <select id="sortSelect">
            <option value="ref_desc">Mais recentes</option>
            <option value="ref_asc">Mais antigos</option>
            <option value="type">Por tipo</option>
          </select>
        </label>
      </div>
      <p id="listStatus" class="muted status"></p>
    </section>

    <section id="docList" class="doc-list"></section>
  </div>

  <!-- ====================== PDF ====================== -->
  <div id="pdfModal" class="modal" hidden>
    <div class="modal-bar">
      <span id="pdfTitle" class="modal-title"></span>
      <span class="modal-actions">
        <a id="pdfDownload" class="btn-sm ghost" download>⬇ Baixar</a>
        <button id="pdfClose" class="btn-sm ghost">✕ Fechar</button>
      </span>
    </div>
    <div id="pdfLoading" class="modal-loading">Carregando documento…</div>
    <iframe id="pdfFrame" title="Visualização do documento"></iframe>
  </div>

  <!-- Nota de feedback (login + lista) -->
  <footer class="bug-note">
    Reporte bugs
    <a href="https://github.com/rodrigofigueiredo005/onviomenos/issues"
       target="_blank" rel="noopener noreferrer">aqui</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
